name: Build and Push Docker Containers

on:
  push:
    branches: [main, staging]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      flavor_filter:
        description: 'Build only the generic image (generic-only) or all flavors (all, default)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - generic-only

env:
  REGISTRY: ghcr.io

# Cancel in-progress builds when a newer commit is pushed to the same ref.
concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Discover Flavors ─────────────────────────────────────────────────────────
  # Only run Docker builds on the monorepo (EverClaw/EverClaw).
  # Composed flavor repos are flattened copies without packages/core/ structure.
  # They can't build Docker images - the Dockerfile expects monorepo paths.

  discover-flavors:
    if: github.repository == 'EverClaw/EverClaw'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build flavor matrix
        id: set-matrix
        run: |
          # Check if we should build only the generic image
          FILTER="${{ github.event.inputs.flavor_filter }}"
          
          if [ "$FILTER" = "generic-only" ]; then
            # Only build the generic image
            MATRIX='[{"flavor": "", "image_name": "everclaw/everclaw"}]'
            echo "matrix={\"include\":$MATRIX}" >> $GITHUB_OUTPUT
            echo "Building generic image only (filter: generic-only)"
          else
            # Discover all flavor directories (monorepo: flavors/ not templates/flavors/)
            FLAVORS=$(ls -d flavors/*/ 2>/dev/null | xargs -I{} basename {} | jq -R . | jq -s .)
            # Build matrix: generic (no flavor) + all discovered flavors
            # Use -c (compact) to keep JSON on a single line for GITHUB_OUTPUT
            MATRIX=$(echo "$FLAVORS" | jq -c '[{"flavor": "", "image_name": "everclaw/everclaw"}, (.[] | {"flavor": ., "image_name": ("everclaw/" + .)})]')
            echo "matrix={\"include\":$MATRIX}" >> $GITHUB_OUTPUT
            echo "Discovered $(echo "$FLAVORS" | jq 'length') flavors + 1 generic"
          fi

  # ─── Build & Push ──────────────────────────────────────────────────────────────
  # Builds one Docker image per matrix entry (generic + all flavors).
  # All images share 99%+ of layers — only the final flavor overlay differs.
  # Each flavor gets both :latest and :CalVer tags.

  build-and-push:
    needs: discover-flavors
    if: github.repository == 'EverClaw/EverClaw'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJson(needs.discover-flavors.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Get version from package.json
        id: version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Detect repo structure
        id: detect
        run: |
          if [ -d "packages/core/scripts" ]; then
            echo "DOCKERFILE=packages/core/Dockerfile" >> $GITHUB_OUTPUT
          else
            echo "DOCKERFILE=Dockerfile" >> $GITHUB_OUTPUT
          fi

      - name: Get OpenClaw version from Dockerfile
        id: openclaw_version
        run: echo "OPENCLAW_VERSION=$(grep -m1 'ARG OPENCLAW_VERSION=' ${{ steps.detect.outputs.DOCKERFILE }} | sed 's/ARG OPENCLAW_VERSION=//')" >> $GITHUB_OUTPUT

      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image_name }}
          tags: |
            # On push to main: tag as "latest" and version from package.json
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.version.outputs.VERSION }},enable=${{ github.ref == 'refs/heads/main' }}
            # On tag push: tag as "latest", version from package.json, and the git tag
            type=match,pattern=v(.*),group=1,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ steps.version.outputs.VERSION }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # Staging builds: tag as "staging" and version-staging (never overwrites latest)
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/staging' }}
            type=raw,value=${{ steps.version.outputs.VERSION }}-staging,enable=${{ github.ref == 'refs/heads/staging' }}
            # PR builds: tag with PR number (not pushed)
            type=ref,event=pr

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.detect.outputs.DOCKERFILE }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            EVERCLAW_VERSION=${{ steps.version.outputs.VERSION }}
            OPENCLAW_VERSION=${{ steps.openclaw_version.outputs.OPENCLAW_VERSION }}
            FLAVOR=${{ matrix.flavor }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache-filters: openclaw-builder
          # amd64 only: Manifest/Morpheus compute providers run x86_64.
          # arm64 via QEMU emulation added ~20min per build with no deployment
          # benefit. Re-add linux/arm64 here if local Apple Silicon images are needed.
          platforms: linux/amd64

      - name: Output image info
        if: github.event_name != 'pull_request'
        run: |
          FLAVOR="${{ matrix.flavor }}"
          LABEL="${FLAVOR:-generic}"
          echo "## Docker Image Published 🐳 ($LABEL)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Flavor:** $LABEL" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pull:**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ matrix.image_name }}:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
