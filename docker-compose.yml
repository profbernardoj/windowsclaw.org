# EverClaw Full Stack — Docker Compose
#
# Quick start:
#   docker compose up -d
#   open http://localhost:18789
#
# Ports:
#   18789 — OpenClaw Gateway (web UI + API)
#   8083  — Morpheus inference proxy (OpenAI-compatible)
#
# First run creates a default config with Morpheus as the primary provider.
# Override by mounting your own config at ~/.openclaw/openclaw.json

services:
  everclaw:
    image: ghcr.io/everclaw/everclaw:2026.4.25.0259
    build:
      context: .
      dockerfile: Dockerfile
      args:
        EVERCLAW_VERSION: "2026.4.24.1832"
    container_name: everclaw
    restart: unless-stopped
    ports:
      # Default: accessible from all interfaces.
      # For local-only use, bind to localhost instead:
      # - "127.0.0.1:18789:18789"
      # - "127.0.0.1:8083:8083"
      - "18789:18789"  # OpenClaw Gateway (web UI)
      - "8083:8083"    # Morpheus inference proxy
    environment:
      # OpenClaw auth token — auto-generated on first run if not set.
      # Set this to use a specific token (useful for automation/CI).
      # Note: `docker compose down -v` removes volumes, so a new token is
      # generated on next start and old bookmarked URLs stop working.
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      # Set to "true" to re-enable device pairing in Docker
      # (advanced — not recommended, Docker bridge breaks device auth):
      # - OPENCLAW_ENABLE_DEVICE_AUTH=true
      # Morpheus proxy settings
      - EVERCLAW_PROXY_PORT=8083
      - EVERCLAW_PROXY_HOST=0.0.0.0
      - EVERCLAW_AUTH_TOKEN=${EVERCLAW_AUTH_TOKEN:-morpheus-local}
      # Morpheus API Gateway (for cloud inference — get a key at app.mor.org)
      - MOR_GATEWAY_API_KEY=${MOR_GATEWAY_API_KEY:-}
      # Security tier: low | recommended | maximum (default: recommended)
      - EVERCLAW_SECURITY_TIER=${EVERCLAW_SECURITY_TIER:-recommended}
      # For P2P staking mode (optional)
      # - MORPHEUS_ROUTER_URL=http://host.docker.internal:8082
      # - ETH_NODE_ADDRESS=https://base-mainnet.public.blastapi.io
      # - WALLET_PRIVATE_KEY=  # Use Docker secrets in production!
    # Container security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,size=64m
    volumes:
      # Persist config, memories, wallet keys, skills, and proxy state
      - ${OPENCLAW_HOME:-~/.openclaw}:/home/node/.openclaw
      - ${MORPHEUS_HOME:-~/.morpheus}:/home/node/.morpheus
      - ${EVERCLAW_HOME:-~/.everclaw}:/home/node/.everclaw
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:18789/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
