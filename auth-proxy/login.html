<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw — Sign In</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 32px;
    }

    .logo h1 {
      color: #fff;
      font-size: 28px;
      font-weight: 700;
    }

    .logo p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      margin-top: 8px;
    }

    .login-section {
      margin-top: 32px;
    }

    .login-title {
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      text-align: center;
    }

    #privy-container {
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .footer {
      margin-top: 32px;
      text-align: center;
      color: rgba(255, 255, 255, 0.4);
      font-size: 12px;
    }

    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      padding: 12px;
      color: #fca5a5;
      font-size: 14px;
      margin-top: 16px;
      display: none;
    }

    .error-message.visible {
      display: block;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: rgba(255, 255, 255, 0.7);
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .success {
      text-align: center;
      padding: 20px;
      color: #86efac;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-icon">__BRAND_ICON__</div>
      <h1>__BRAND_NAME__</h1>
      <p>__BRAND_TAGLINE__</p>
    </div>

    <div class="login-section">
      <p class="login-title">Authenticating to your agent...</p>

      <div id="privy-container">
        <div class="loading" id="loading">
          <div class="spinner"></div>
          <p>Loading authentication...</p>
        </div>
      </div>
    </div>

    <div class="error-message" id="error-message"></div>

    <div class="footer">
      <p>Powered by OpenClaw & Privy</p>
      <p style="margin-top: 8px;">Your agent. Your inference. Your data.</p>
    </div>
  </div>

  <!--
    Configuration injected by the auth proxy at serve time.
    The bundled login-app reads these window globals.
    No secrets — PRIVY_APP_ID and PRIVY_CLIENT_ID are public values.
  -->
  <script>
    window.__EVERCLAW_PRIVY_APP_ID__ = '__PRIVY_APP_ID__';
    window.__EVERCLAW_PRIVY_CLIENT_ID__ = '__PRIVY_CLIENT_ID__';
  </script>

  <!--
    Bundled at Docker build time — no runtime CDN dependency.
    Contains React 18 + ReactDOM + @privy-io/react-auth + login-app.jsx.
    Built by: npm run build (esbuild, see build-login.mjs)
  -->
  <script src="/auth/login-bundle.js"></script>
</body>
</html>
